# .github/workflows/claude-review.yml
name: AI Code Review
on: [pull_request]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run AI Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git diff origin/main...HEAD | claude -p \
            "Review this PR diff for bugs, security issues, \
             and style violations. Rate each: critical/major/minor." \
            --output-format json \
            --allowedTools "Read,Grep" > review.json

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = require('./review.json');
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## AI Review\n${review.result}`
            });

      - name: Analyze Test Failure
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Capture the test output from the failed step
          pytest tests/ -v 2>&1 | tail -100 > test-output.txt
          
          # Ask Claude to explain and suggest a fix
          cat test-output.txt | claude -p \
            "This CI test run failed. Explain:
             1. Which test(s) failed and why
             2. Root cause analysis
             3. Suggested fix (with code if possible)
             4. Is this a flaky test or a real bug?" \
            --output-format json > failure-analysis.json